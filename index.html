<input type="text" id="name " name="father" placeholder="Enters your Father's & guidence name" required></td></tr>

<td>

</td></tr>
<tr><td>

</td></tr>
</table>

    </td></tr>
<tr>

 <label for="mandal">Mandal*</label>

<option value="delivery1">cash counter</option>
<option value="delivery2">area Location</option>
